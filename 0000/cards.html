<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今日訊息 | 00:00 能量卡</title>
<link rel="icon" href="assets/logo-mark.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    width:100%; min-height:100vh;
    color:#f2e8d8;
    font-family:'Noto Sans TC', 'Noto Serif TC', serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    background:
      linear-gradient(180deg, rgba(10,9,8,0.55) 0%, rgba(10,9,8,0.38) 35%, rgba(10,9,8,0.72) 100%),
      url('assets/bg-water.jpg') center / cover no-repeat fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding: 2rem 1.25rem 4rem;
  }

  header.nav{
    width:100%;
    max-width:640px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 1.5rem;
  }
  .brand-mark{ height: 32px; width: auto; display:block; }
  .back-link{
    font-size:0.78rem; letter-spacing:0.1em; color:#e6d9c2;
    text-decoration:none; border-bottom:1px solid rgba(230,217,194,0.5); padding-bottom:2px;
    white-space:nowrap;
  }

  main{
    flex:1;
    width:100%;
    max-width:660px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .eyebrow{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    letter-spacing:0.15em;
    color:#d8c3a0;
    font-size:0.95rem;
    margin-bottom:0.4rem;
  }
  h1{
    font-family:'Noto Serif TC', serif;
    font-weight:900;
    font-size:clamp(1.7rem, 6vw, 2.3rem);
    letter-spacing:0.08em;
    color:#f7efe1;
  }
  .sub{
    margin-top:0.7rem;
    font-size:0.9rem;
    color:#d8c3a0;
    letter-spacing:0.03em;
    max-width:30ch;
  }

  /* ---- card stage ---- */
  .stage{
    position:relative;
    width: min(88vw, 330px);
    aspect-ratio: 720 / 1153;
    margin: 2.6rem 0 1.6rem;
    perspective: 1400px;
  }
  .stage.landscape{
    width: min(96vw, 640px);
    aspect-ratio: 960 / 599;
  }

  .deco{
    position:absolute;
    inset:0;
    border-radius:16px;
    overflow:hidden;
    background: #2d313d url('assets/card-back.jpg') center / contain no-repeat;
    border:1px solid rgba(242,232,216,0.18);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    transition: transform .5s ease, opacity .5s ease;
  }
  .deco1{ transform: rotate(-9deg) translate(-10px, 6px); }
  .deco2{ transform: rotate(7deg) translate(10px, 4px); }
  .stage.drawn .deco{ opacity:0; transform: scale(0.9) translateY(10px); }

  @keyframes shuffleJitter{
    0%   { transform: rotate(-9deg) translate(-10px, 6px) scale(1); }
    15%  { transform: rotate(-22deg) translate(-46px, 10px) scale(0.97); }
    30%  { transform: rotate(20deg) translate(42px, -8px) scale(0.97); }
    45%  { transform: rotate(-26deg) translate(-50px, 6px) scale(0.97); }
    60%  { transform: rotate(18deg) translate(38px, -10px) scale(0.97); }
    75%  { transform: rotate(-14deg) translate(-24px, 4px) scale(0.98); }
    90%  { transform: rotate(4deg) translate(6px, -2px) scale(1); }
    100% { transform: rotate(-9deg) translate(-10px, 6px) scale(1); }
  }
  @keyframes shuffleJitter2{
    0%   { transform: rotate(7deg) translate(10px, 4px) scale(1); }
    15%  { transform: rotate(24deg) translate(48px, -6px) scale(0.97); }
    30%  { transform: rotate(-18deg) translate(-44px, 10px) scale(0.97); }
    45%  { transform: rotate(28deg) translate(52px, -4px) scale(0.97); }
    60%  { transform: rotate(-16deg) translate(-40px, 8px) scale(0.97); }
    75%  { transform: rotate(12deg) translate(22px, -4px) scale(0.98); }
    90%  { transform: rotate(-4deg) translate(-6px, 2px) scale(1); }
    100% { transform: rotate(7deg) translate(10px, 4px) scale(1); }
  }
  @keyframes shuffleJitterCard{
    0%   { transform: rotate(0deg) translate(0, 0) scale(1); }
    15%  { transform: rotate(13deg) translate(30px, -6px) scale(0.98); }
    30%  { transform: rotate(-16deg) translate(-32px, 8px) scale(0.98); }
    45%  { transform: rotate(15deg) translate(34px, -6px) scale(0.98); }
    60%  { transform: rotate(-12deg) translate(-26px, 6px) scale(0.98); }
    75%  { transform: rotate(8deg) translate(14px, -3px) scale(0.99); }
    90%  { transform: rotate(-3deg) translate(-4px, 2px) scale(1); }
    100% { transform: rotate(0deg) translate(0, 0) scale(1); }
  }
  .stage.shuffling .deco1{ animation: shuffleJitter 1.1s ease-in-out; }
  .stage.shuffling .deco2{ animation: shuffleJitter2 1.1s ease-in-out; }
  .stage.shuffling .card{ animation: shuffleJitterCard 1.1s ease-in-out; }

  .card{
    position:absolute;
    inset:0;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    background: #2d313d url('assets/card-back.jpg') center / contain no-repeat;
    border:1px solid rgba(242,232,216,0.25);
    box-shadow: 0 16px 40px rgba(0,0,0,0.45);
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform .28s ease;
    transform-style: preserve-3d;
  }
  .card.flipping{ transition: transform .26s cubic-bezier(.4,0,.2,1); }

  .card-face{
    position:absolute;
    inset:0;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
  }
  .card-face img{
    width:100%; height:100%; object-fit:cover; display:block;
  }

  .card:not(.can-tap){ cursor:default; }

  .hint{
    margin-top:0.2rem;
    min-height:1.4em;
    font-size:0.82rem;
    letter-spacing:0.06em;
    color:#d8c3a0;
    opacity:0;
    transition: opacity .4s ease;
  }
  .hint.show{ opacity:1; }

  .cta-btn{
    margin-top:1.6rem;
    display:inline-block;
    background:#f2e8d8;
    color:#3c2c1f;
    border:none;
    padding:1rem 3rem;
    font-size:0.9rem;
    letter-spacing:0.2em;
    font-family:inherit;
    cursor:pointer;
    transition: transform .3s ease, box-shadow .3s ease, opacity .3s ease;
    box-shadow: 0 4px 30px rgba(0,0,0,0.25);
  }
  .cta-btn:hover{ transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,0,0,0.35); }
  .cta-btn:active{ transform: translateY(0); }
  .cta-btn.ghost{
    background:transparent;
    color:#f2e8d8;
    border:1px solid rgba(242,232,216,0.5);
    box-shadow:none;
  }
  .cta-btn[hidden]{ display:none; }

  .actions{
    margin-top:1.6rem;
    display:flex;
    gap:0.9rem;
    flex-wrap:wrap;
    justify-content:center;
  }

</style>
</head>
<body>

<header class="nav">
  <img src="assets/header-logo.png" alt="00:00 A New Day" class="brand-mark">
  <a href="index.html" class="back-link">← 回首頁</a>
</header>

<main>
  <div class="eyebrow">Today's Message</div>
  <h1 id="titleText">今日訊息</h1>
  <p class="sub" id="subText">靜下心，點選卡牌<br>抽一張屬於今天的訊息</p>

  <div class="stage" id="stage">
    <div class="deco deco1"></div>
    <div class="deco deco2"></div>
    <div class="card" id="card">
      <div class="card-face" id="cardFace"></div>
    </div>
  </div>

  <p class="hint" id="hint"></p>

  <button class="cta-btn" id="drawBtn" type="button">抽一張今日訊息卡</button>

  <div class="actions">
    <button class="cta-btn ghost" id="againBtn" type="button" hidden>再抽一張</button>
  </div>
</main>

<script>
  const TOTAL_CARDS = 10;
  const stage = document.getElementById('stage');
  const card = document.getElementById('card');
  const cardFace = document.getElementById('cardFace');
  const drawBtn = document.getElementById('drawBtn');
  const againBtn = document.getElementById('againBtn');
  const hint = document.getElementById('hint');
  const titleText = document.getElementById('titleText');
  const subText = document.getElementById('subText');

  let state = 'idle'; // idle -> revealing -> front -> back
  let lastDrawn = null;

  const loadedImages = new Set();
  function preloadImage(src){
    return new Promise(resolve => {
      if (loadedImages.has(src)){ resolve(); return; }
      const img = new Image();
      img.onload = () => { loadedImages.add(src); resolve(); };
      img.onerror = () => resolve();
      img.src = src;
    });
  }

  for (let n = 1; n <= TOTAL_CARDS; n++){
    const nn = String(n).padStart(2, '0');
    preloadImage(`assets/cards/card-${nn}-front.jpg`);
    preloadImage(`assets/cards/card-${nn}-back.jpg`);
  }

  function pickCard(){
    let n;
    do { n = 1 + Math.floor(Math.random() * TOTAL_CARDS); }
    while (TOTAL_CARDS > 1 && n === lastDrawn);
    lastDrawn = n;
    return n;
  }

  function flipCardTo(renderFn, { instant } = {}){
    return new Promise(resolve => {
      if (instant){
        Promise.resolve(renderFn()).then(resolve);
        return;
      }
      card.classList.add('flipping');
      card.style.transform = 'rotateY(90deg) scale(0.96)';
      setTimeout(() => {
        Promise.resolve(renderFn()).then(() => {
          card.style.transform = 'rotateY(0deg) scale(1)';
          setTimeout(resolve, 260);
        });
      }, 260);
    });
  }

  function renderFacedown(){
    cardFace.innerHTML = '';
  }

  async function renderFront(n){
    const src = `assets/cards/card-${String(n).padStart(2,'0')}-front.jpg`;
    await preloadImage(src);
    cardFace.innerHTML = `<img src="${src}" alt="00:00 能量卡 第${n}張 正面">`;
  }

  async function renderBack(n){
    const src = `assets/cards/card-${String(n).padStart(2,'0')}-back.jpg`;
    await preloadImage(src);
    cardFace.innerHTML = `<img src="${src}" alt="00:00 能量卡 第${n}張 今日訊息">`;
  }

  async function startDraw(){
    if (state !== 'idle') return;
    state = 'drawing';
    drawBtn.disabled = true;
    hint.classList.remove('show');
    subText.textContent = '洗牌中…靜心感受此刻';

    stage.classList.add('shuffling');
    await new Promise(r => setTimeout(r, 900));
    stage.classList.remove('shuffling');
    stage.classList.add('drawn');

    const n = pickCard();
    await flipCardTo(() => renderFront(n));

    state = 'front';
    card.classList.add('can-tap');
    titleText.textContent = '今日訊息';
    subText.textContent = '這是屬於你今天的一張卡';
    hint.textContent = '輕觸卡牌，翻開今日訊息 →';
    hint.classList.add('show');
    drawBtn.hidden = true;
    againBtn.hidden = true;

    card.dataset.drawn = n;
  }

  async function revealBack(){
    if (state !== 'front') return;
    state = 'back';
    card.classList.remove('can-tap');
    const n = parseInt(card.dataset.drawn, 10);
    await flipCardTo(() => { stage.classList.add('landscape'); renderBack(n); });

    hint.classList.remove('show');
    subText.textContent = '願這份訊息，陪你度過今天';
    againBtn.hidden = false;
  }

  function resetDeck(){
    state = 'idle';
    stage.classList.remove('drawn');
    card.classList.remove('can-tap');
    flipCardTo(() => { stage.classList.remove('landscape'); renderFacedown(); });
    titleText.textContent = '今日訊息';
    subText.innerHTML = '靜下心，點選卡牌<br>抽一張屬於今天的訊息';
    hint.classList.remove('show');
    drawBtn.hidden = false;
    drawBtn.disabled = false;
    againBtn.hidden = true;
  }

  drawBtn.addEventListener('click', startDraw);
  againBtn.addEventListener('click', resetDeck);
  card.addEventListener('click', () => {
    if (state === 'front') revealBack();
  });
</script>

</body>
</html>
